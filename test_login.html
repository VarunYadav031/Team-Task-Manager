<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Login Functionality</h1>
        <p>Testing API endpoint: <code id="api-url"></code></p>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" value="varun@gmail.com">
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" value="123456">
        </div>
        
        <button onclick="testLogin()">Test Login</button>
        
        <div id="result" class="result" style="display: none;"></div>
        
        <h3>Debug Info:</h3>
        <pre id="debug"></pre>
    </div>

    <script>
        document.getElementById('api-url').textContent = window.location.origin + '/api/auth/login';
        
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            const debugPre = document.getElementById('debug');
            
            resultDiv.style.display = 'none';
            debugPre.textContent = 'Sending request...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const responseText = await response.text();
                let responseData;
                try {
                    responseData = JSON.parse(responseText);
                } catch (e) {
                    responseData = { error: 'Invalid JSON', text: responseText };
                }
                
                debugPre.textContent = `Status: ${response.status} ${response.statusText}\nHeaders: ${JSON.stringify([...response.headers], null, 2)}\nResponse: ${JSON.stringify(responseData, null, 2)}`;
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `<strong>Success!</strong> Login worked. Token received: ${responseData.token ? 'Yes' : 'No'}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `<strong>Error ${response.status}:</strong> ${responseData.msg || responseData.error || 'Unknown error'}`;
                }
                resultDiv.style.display = 'block';
                
            } catch (error) {
                debugPre.textContent = `Network error: ${error.message}`;
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<strong>Network Error:</strong> ${error.message}`;
                resultDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
